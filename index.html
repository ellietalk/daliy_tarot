  --prod-img-placeholder:linear-gradient(135deg,rgba(220,100,140,.12),rgba(240,130,160,.1));

/* 大地色 */
[data-theme="earth"]{
  --body-bg:#f2ede6;
  --wrap-bg:linear-gradient(160deg,#f8f2e8 0%,#ede4d8 40%,#f5ede0 100%);
  --wrap-border:rgba(160,120,80,0.3);
  --wrap-shadow:0 0 40px rgba(140,100,60,0.12),0 0 0 1px rgba(255,250,245,0.6);
  --brand-name:#3d2510;
  --brand-sub:rgba(120,80,40,0.7);
  --divider-line:rgba(160,120,80,0.35);
  --divider-star:rgba(140,100,60,0.6);
  --prompt:rgba(80,50,25,0.85);
  --date-badge-bg:rgba(160,120,80,0.1);
  --date-badge-border:rgba(160,120,80,0.25);
  --date-badge-text:rgba(120,80,40,0.6);
  --hint-color:rgba(120,80,40,0.7);
  --resel-bg:rgba(248,242,232,0.9);
  --resel-border:rgba(160,120,80,0.4);
  --resel-color:rgba(80,50,25,0.8);
  --no-content:rgba(140,100,60,0.5);
  --no-content-border:rgba(160,120,80,0.25);
  --card-back-bg:linear-gradient(155deg,#3d2510 0%,#7a5030 45%,#a07050 100%);
  --card-back-border:rgba(180,140,90,0.55);
  --card-back-inner-bg:rgba(200,160,100,0.12);
  --card-back-inner-border:rgba(220,180,130,0.35);
  --card-front-bg:linear-gradient(150deg,#f8f2e8 0%,#ede4d5 45%,#f5ede0 100%);
  --card-front-border:rgba(160,120,80,0.6);
  --card-front-inner-bg:linear-gradient(145deg,rgba(255,252,245,0.9),rgba(240,228,210,0.7));
  --card-front-inner-border:rgba(160,120,80,0.4);
  --cfront-lbl:#5a3518;
  --cfront-name:#3d2510;
  --cfront-sub:#8a6035;
  --result-bg:linear-gradient(150deg,rgba(248,242,232,0.98),rgba(240,228,210,0.97));
  --result-border:rgba(160,120,80,0.4);
  --res-badge-bg:rgba(160,120,80,0.14);
  --res-badge-border:rgba(140,100,60,0.3);
  --res-badge-color:#5a3518;
  --res-card-name:#8a6035;
  --res-title:#3d2510;
  --res-body:#5a3820;
  --res-tip-bg:rgba(255,252,245,0.9);
  --res-tip-border:rgba(180,140,90,0.45);

  --prod-card-name:#3d2510;

  --prod-card-price:#5a3518;

html,body{min-height:100%;background:var(--body-bg)}
body{
  font-family:'Noto Serif TC',serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;padding:1.2rem;
  transition:background .5s;
}
.wrap{
  width:100%;max-width:440px;
  background:var(--wrap-bg);
  border-radius:28px;
  border:1.5px solid var(--wrap-border);
  box-shadow:var(--wrap-shadow);
  overflow:hidden;position:relative;
  transition:background .5s, box-shadow .5s;
}
.stars-bg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:1.8rem 1.2rem 1rem}
.brand-name{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--brand-name);letter-spacing:.12em;margin-bottom:3px;text-shadow:0 0 20px rgba(180,140,255,0.3)}
.brand-sub{font-size:11px;color:var(--brand-sub);margin-bottom:1.1rem;letter-spacing:.1em}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:1rem;width:100%;max-width:200px}
.divider hr{flex:1;border:none;border-top:1px solid var(--divider-line)}
.divider span{font-size:12px;color:var(--divider-star)}
.prompt-txt{font-size:13px;color:var(--prompt);margin-bottom:.5rem;letter-spacing:.04em;text-align:center}
.date-badge{font-size:11px;color:var(--date-badge-text);background:var(--date-badge-bg);border:1px solid var(--date-badge-border);border-radius:20px;padding:3px 14px;margin-bottom:1.2rem}

/* cards */
.cards-row{display:flex;justify-content:center;gap:14px;margin-bottom:1rem;position:relative;z-index:1;flex-wrap:wrap;padding:0 .8rem}
.card-wrap{width:100px;height:160px;perspective:900px;cursor:pointer;flex-shrink:0;filter:drop-shadow(0 8px 24px rgba(80,40,180,0.4));transition:filter .3s}
.card-wrap:hover:not(.done) .card-inner{transform:translateY(-10px) scale(1.05)!important}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)!important}
.card-wrap.faded{opacity:.12;pointer-events:none;transition:opacity .5s;filter:none}
.card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,.2,.2,1)}
.cface{position:absolute;width:100%;height:100%;border-radius:18px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}

/* back */
.cback{background:var(--card-back-bg);border:1.5px solid var(--card-back-border);box-shadow:inset 0 0 30px rgba(100,60,200,0.15)}
.cback-inner{width:82%;height:84%;border-radius:13px;border:1px solid var(--card-back-inner-border);background:var(--card-back-inner-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.cback-lbl{font-family:'Cinzel',serif;font-size:11px;color:rgba(200,180,255,0.55);letter-spacing:.15em;margin-top:4px}

/* front */
.cfront{transform:rotateY(180deg);background:var(--card-front-bg);border:1.5px solid var(--card-front-border);box-shadow:0 0 0 .5px rgba(255,255,255,.5)}
.cfront-inner{width:82%;height:84%;border-radius:13px;border:1px solid var(--card-front-inner-border);background:var(--card-front-inner-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.4rem;overflow:hidden}
.cfront-symbol{font-size:30px;line-height:1;margin-bottom:3px}
.cfront-lbl{font-family:'Cinzel',serif;font-size:26px;font-weight:600;color:var(--cfront-lbl);line-height:1;margin-bottom:4px}
.cfront-name{font-size:9.5px;font-weight:600;color:var(--cfront-name);letter-spacing:.06em;text-align:center;line-height:1.3}
.cfront-sub{font-size:8.5px;color:var(--cfront-sub);letter-spacing:.08em;margin-top:2px}

.cfront.has-img{background:none;border:none}
.cfront.has-img .cfront-inner{background:none;border:none;padding:0;width:100%;height:100%}
.cfront.has-img .cfront-inner img{width:100%;height:100%;object-fit:cover;border-radius:18px;display:block}

.hint-row{font-size:12px;color:var(--hint-color);text-align:center;margin-bottom:.6rem;position:relative;z-index:1;min-height:18px}
.reselect-btn{display:none;margin:0 auto .8rem;background:var(--resel-bg);border:1.5px solid var(--resel-border);color:var(--resel-color);font-family:'Noto Serif TC',serif;font-size:12px;padding:5px 20px;border-radius:20px;cursor:pointer;transition:background .2s;position:relative;z-index:1}
.reselect-btn.show{display:block;width:fit-content}

.no-content{margin:.5rem .8rem 1rem;padding:1.2rem;text-align:center;color:var(--no-content);font-size:13px;border:1px dashed var(--no-content-border);border-radius:16px;position:relative;z-index:1}

/* result */
.result-area{display:none;margin:0 .8rem .9rem;background:var(--result-bg);border:1.5px solid var(--result-border);border-radius:20px;padding:1.1rem 1.15rem 1rem;text-align:left;animation:fadeUp .5s ease;position:relative;z-index:1}
.result-area.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.res-badge{display:inline-block;font-size:11px;font-weight:600;color:var(--res-badge-color);background:var(--res-badge-bg);border:1px solid var(--res-badge-border);border-radius:10px;padding:2px 12px;letter-spacing:.05em;margin-bottom:8px}
.res-card-name{font-size:12px;color:var(--res-card-name);margin-bottom:6px;font-weight:600;display:flex;align-items:center;gap:5px}
.res-title{font-size:14.5px;font-weight:600;color:var(--res-title);margin-bottom:10px;line-height:1.6}
.res-body{font-size:13px;color:var(--res-body);line-height:1.85;margin-bottom:10px}
.res-body p{margin-bottom:6px}
.res-tip{background:var(--res-tip-bg);border:1.5px solid var(--res-tip-border);border-radius:14px;padding:9px 13px;font-size:13px;font-weight:500;color:var(--res-tip-color);margin-bottom:10px;line-height:1.65}
.res-cta{font-size:12px;color:var(--res-cta);line-height:1.8;border-top:1px solid var(--res-cta-border);padding-top:10px;margin-bottom:10px}
.btn-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.contact-btn{display:inline-block;background:var(--contact-btn-bg);color:#fff;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:500;padding:8px 22px;border-radius:22px;text-decoration:none;box-shadow:0 4px 16px rgba(80,40,180,0.25);cursor:pointer;border:none}
.again-btn{background:var(--again-btn-bg);border:1.5px solid var(--again-btn-border);color:var(--again-btn-color);font-family:'Noto Serif TC',serif;font-size:12px;padding:7px 16px;border-radius:22px;cursor:pointer}
.res-card-thumb{width:52px;height:83px;border-radius:9px;object-fit:cover;margin-bottom:8px;border:1px solid var(--result-border);display:block}
.loading-msg{text-align:center;color:var(--hint-color);font-size:13px;padding:2rem 1rem;position:relative;z-index:1}

/* 推薦商品區 */
.products-area{margin:0 .8rem 1.2rem;position:relative;z-index:1}
.products-title{font-size:11px;color:var(--prod-title-color);letter-spacing:.1em;text-align:center;margin-bottom:.7rem;display:flex;align-items:center;gap:8px}
.products-title::before,.products-title::after{content:'';flex:1;border-top:1px solid var(--prod-title-line)}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.prod-card{background:var(--prod-card-bg);border:1.5px solid var(--prod-card-border);border-radius:16px;overflow:hidden;text-decoration:none;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(100,60,200,.15)}
.prod-card-img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block}
.prod-card-img-placeholder{width:100%;aspect-ratio:3/2;background:var(--prod-img-placeholder);display:flex;align-items:center;justify-content:center;font-size:28px}
.prod-card-body{padding:.55rem .65rem .6rem;flex:1;display:flex;flex-direction:column;gap:3px}
.prod-card-tag{font-size:9.5px;color:var(--prod-card-tag);letter-spacing:.06em}
.prod-card-name{font-size:12px;font-weight:600;color:var(--prod-card-name);line-height:1.4}
.prod-card-desc{font-size:10.5px;color:var(--prod-card-desc);line-height:1.5;opacity:.85}
.prod-card-price{font-size:12px;font-weight:700;color:var(--prod-card-price);margin-top:auto;padding-top:4px}
.prod-card-cta{font-size:10px;color:var(--prod-card-cta);text-align:right;margin-top:2px;opacity:.75}

@media(max-width:480px){.wrap{border-radius:22px;max-width:100%}.card-wrap{width:86px;height:138px}.cfront-symbol{font-size:26px}.cfront-lbl{font-size:22px}}
@media(max-width:360px){.cards-row{gap:9px}.card-wrap{width:78px;height:124px}.products-grid{grid-template-columns:1fr}}
</style>
</head>

    <polygon points="80,350 81,354 85,354 81.8,356 83,360 80,358 77,360 78.2,356 75,354 79,354" fill="#b0c8ff" opacity=".28"/>
    <polygon points="340,440 341,444 345,444 341.8,446 343,450 340,448 337,450 338.2,446 335,444 339,444" fill="#c8b0f8" opacity=".28"/>
  </svg>
  <div class="hero">
    <div class="brand-name" id="brandName">每日塔羅</div>
    <div class="brand-sub" id="brandSub">今日運勢占卜</div>
    <div class="divider"><hr><span>✦</span><hr></div>
    <div class="prompt-txt">閉上眼睛，感受哪張牌在呼喚你</div>
    <div class="date-badge" id="dateBadge"></div>
  </div>
  <div class="loading-msg" id="loadingMsg">✦ 正在連線星象 ✦</div>
  <div class="cards-row" id="cardsRow" style="display:none"></div>
  <div style="text-align:center;position:relative;z-index:1">
    <div class="hint-row" id="hintTxt" style="display:none">輕觸一張牌，揭開今日的訊息 ✨</div>
    <button class="reselect-btn" id="reselBtn" onclick="doReset()">↩ 再抽一次</button>
  </div>
  <div class="no-content" id="noContent" style="display:none">✦ 今日尚未設定牌陣，請稍後再來 ✦</div>
  <div class="result-area" id="resultArea"></div>
  <div class="products-area" id="productsArea" style="display:none"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCY1ceNPz1QIAgRngezIhTXiJx_o10uUh0",
  authDomain: "tarot-1ce81.firebaseapp.com",
  projectId: "tarot-1ce81",
  storageBucket: "tarot-1ce81.firebasestorage.app",
  messagingSenderId: "943943050390",
  appId: "1:943943050390:web:488b2c155bee1630324eb7"
};
firebase.initializeApp(firebaseConfig);
const fdb = firebase.firestore();
const COLLECTION      = 'tarot_readings';
const PROD_COLLECTION = 'shop_products';

const LABELS = ['A','B','C','D','E'];
const CARD_SYMBOLS = {
  '愚者':'🌟','魔法師':'✨','女祭司':'🌙','女皇':'🌸','皇帝':'👑','教皇':'🕯️',
  '戀人':'💞','戰車':'🏹','力量':'🦁','隱士':'🔦','命運之輪':'🎡','正義':'⚖️',
  '倒吊人':'🌀','死神':'🦋','節制':'💧','惡魔':'🔥','高塔':'⚡','星星':'⭐',
  '月亮':'🌕','太陽':'☀️','審判':'🎺','世界':'🌍'
};
function getSymbol(n){
  if(!n) return '✦';
  if(CARD_SYMBOLS[n]) return CARD_SYMBOLS[n];
  if(n.startsWith('權杖')) return '🔥';
  if(n.startsWith('聖杯')) return '💧';
  if(n.startsWith('寶劍')) return '🗡️';
  if(n.startsWith('金幣')) return '🪙';
  return '✦';
}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDate(k){const[y,m,d]=k.split('-');return`${y} 年 ${Number(m)} 月 ${Number(d)} 日`}

function drawBackCanvas(canvas, label){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  function moon(cx,cy,r,col,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.globalAlpha=a*.15;ctx.fillStyle=col;ctx.fill();ctx.globalAlpha=a*.7;ctx.stroke();ctx.beginPath();ctx.arc(cx+r*.32,cy,r*.72,0,Math.PI*2);ctx.globalAlpha=a*.28;ctx.fillStyle='rgba(0,0,0,.5)';ctx.fill();ctx.restore()}
  function star5(cx,cy,r,col,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=.8;ctx.beginPath();for(let i=0;i<5;i++){const ang=-Math.PI/2+i*Math.PI*2/5;const x=cx+Math.cos(ang)*r,y=cy+Math.sin(ang)*r;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.globalAlpha=a*.2;ctx.fillStyle=col;ctx.fill();ctx.globalAlpha=a*.7;ctx.stroke();ctx.restore()}
  moon(W/2,H/2-2,H*.27,'#c8b8ff',.9);
  star5(8,8,5,'#a0b8ff',.7);star5(W-8,10,4,'#e0b8ff',.65);star5(6,H-8,4,'#b8c8ff',.6);star5(W-7,H-8,4.5,'#d0b0f8',.65);
  [[W/2+16,7],[4,H/2],[W-4,H/2-4],[W/2-18,H-5]].forEach(([x,y])=>{ctx.save();ctx.globalAlpha=.55;ctx.fillStyle='rgba(220,200,255,.8)';ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();ctx.restore()});
  ctx.save();ctx.globalAlpha=.55;ctx.fillStyle='rgba(200,180,255,.7)';ctx.font='bold 9px Cinzel,serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,W/2,H/2+H*.38);ctx.restore();
}
function drawFrontCanvas(canvas){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=.5;ctx.strokeStyle='#8060c0';ctx.lineWidth=.7;ctx.beginPath();
  for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;const x=W/2+Math.cos(a)*Math.min(W,H)*.38,y=H/2+Math.sin(a)*Math.min(W,H)*.38;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.closePath();ctx.globalAlpha=.12;ctx.fillStyle='#8060c0';ctx.fill();ctx.globalAlpha=.5;ctx.stroke();ctx.restore();
}

let done=false, currentData=null, allProducts=[];

async function initFrontend(){
  document.getElementById('dateBadge').textContent = fmtDate(today());

  // 讀取全域設定（主題 + 商品開關）
  let showProducts = true;
  try {
    const cfg = await fdb.doc('settings/global').get();
    if(cfg.exists){
      const d = cfg.data();
      if(d.showProducts === false) showProducts = false;
      if(d.theme) applyTheme(d.theme);
    }
  } catch(e) { /* 設定讀取失敗不影響主流程 */ }

  // 讀取今日牌陣
  let data = null;
  try {
    const snap = await fdb.collection(COLLECTION).doc(today()).get();
    if(snap.exists) data = snap.data();
  } catch(err) {
    document.getElementById('loadingMsg').textContent = '✦ 連線失敗，請稍後再試 ✦';
    return;
  }

  document.getElementById('loadingMsg').style.display = 'none';
  if(data && data.brandName) document.getElementById('brandName').textContent = data.brandName;
  if(data && data.brandSub)  document.getElementById('brandSub').textContent  = data.brandSub;
  if(data && data.contactLabel) window._cLabel = data.contactLabel;
  if(data && data.contactLink)  window._cLink  = data.contactLink;
  if(data && data.contactCta)   window._cCta   = data.contactCta;

  if(!data || !data.cards || !data.cards.length){
    document.getElementById('noContent').style.display = 'block';
  } else {
    document.getElementById('cardsRow').style.display = '';
    document.getElementById('hintTxt').style.display  = '';
    currentData = data;
    buildCards(data.cards);
  }

  if(showProducts) loadProducts();
}

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
}

function buildCards(cards){
  const row = document.getElementById('cardsRow');
  row.innerHTML = ''; done = false;
  cards.forEach((card, i) => {
    const lbl = LABELS[i];
    const hasImg  = !!(card.imageData);
    const hasName = !!(card.name);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap'; wrap.id = 'cw'+lbl;
    wrap.onclick = () => pick(lbl, i);
    if(hasImg){
      wrap.innerHTML = `<div class="card-inner">
        <div class="cface cback"><div class="cback-inner"><canvas id="cv${lbl}" width="62" height="56"></canvas></div></div>
        <div class="cface cfront has-img"><div class="cfront-inner"><img src="${card.imageData}" alt="${card.name||lbl}" loading="lazy"></div></div>
      </div>`;
    } else if(hasName){
      wrap.innerHTML = `<div class="card-inner">
        <div class="cface cback"><div class="cback-inner"><canvas id="cv${lbl}" width="62" height="56"></canvas></div></div>
        <div class="cface cfront"><div class="cfront-inner">
          <canvas id="fcv${lbl}" width="28" height="28"></canvas>
          <div class="cfront-symbol">${getSymbol(card.name)}</div>
          <div class="cfront-name">${card.name}</div>
          <div class="cfront-sub">已翻開</div>
        </div></div>
      </div>`;
    } else {
      wrap.innerHTML = `<div class="card-inner">
        <div class="cface cback"><div class="cback-inner"><canvas id="cv${lbl}" width="62" height="56"></canvas></div></div>
        <div class="cface cfront"><div class="cfront-inner">
          <canvas id="fcv${lbl}" width="28" height="28"></canvas>
          <div class="cfront-lbl">${lbl}</div>
          <div class="cfront-sub">已翻開</div>
        </div></div>
      </div>`;
    }
    row.appendChild(wrap);
    requestAnimationFrame(() => {
      drawBackCanvas(document.getElementById('cv'+lbl), lbl);
      const fc = document.getElementById('fcv'+lbl); if(fc) drawFrontCanvas(fc);
    });
  });
}

function pick(lbl, idx){
  if(done) return; done = true;
  document.getElementById('cw'+lbl).classList.add('flipped');
  currentData.cards.forEach((_,i) => {
    const l = LABELS[i];
    const el = document.getElementById('cw'+l);
    if(el){ el.classList.add('done'); if(l!==lbl) el.classList.add('faded'); }
  });
  document.getElementById('hintTxt').textContent = '✦ 牌面揭曉';
  document.getElementById('reselBtn').classList.add('show');
  setTimeout(() => showResult(idx, lbl), 760);
}

function showResult(idx, lbl){
  const card  = currentData.cards[idx];
  const label = lbl || LABELS[idx];
  const paras = (card.reading||'').split('\n\n').filter(p=>p.trim()).map(p=>'<p>'+p+'</p>').join('');
  const ctaText      = window._cCta   || '🌙 如果你想深入了解更多，歡迎預約一對一占卜';
  const contactLabel = window._cLabel || '預約占卜';
  const contactLink  = window._cLink  || '#';
  const thumbHtml = card.imageData ? `<img class="res-card-thumb" src="${card.imageData}" alt="${card.name||label}">` : '';
  const nameHtml  = card.name
    ? `<div class="res-card-name">${getSymbol(card.name)} ${card.name}</div>`
    : `<div class="res-card-name">牌位 ${label}</div>`;
  const el = document.getElementById('resultArea');
  el.innerHTML = `
    <div class="res-badge">你選了 ${label} 牌</div>
    ${thumbHtml}
    ${nameHtml}
    <div class="res-title">${card.title||''}</div>
    <div class="res-body">${paras}</div>
    ${card.tip ? `<div class="res-tip">✦ ${card.tip}</div>` : ''}
    <div class="res-cta">${ctaText}</div>
    <div class="btn-row">
      <button class="contact-btn" onclick="window.open('${contactLink}','_blank')">${contactLabel}</button>
      <button class="again-btn" onclick="doReset()">再抽一次</button>
    </div>`;
  el.classList.add('show');
  // 傳入牌名（可為空字串）和位置代號
  showProductsForCard(card.name || '', label);
}

function doReset(){
  done = false;
  if(currentData && currentData.cards) buildCards(currentData.cards);
  document.getElementById('reselBtn').classList.remove('show');
  const ra = document.getElementById('resultArea');
  ra.classList.remove('show'); ra.innerHTML = '';
  document.getElementById('hintTxt').textContent = '輕觸一張牌，揭開今日的訊息 ✨';
  document.getElementById('productsArea').style.display = 'none';
}

// ==============================
//  推薦商品（支援位置綁定 pos:A 和牌名綁定）
// ==============================
async function loadProducts(){
  try {
    const snap = await fdb.collection(PROD_COLLECTION).get();
    allProducts = [];
    snap.forEach(d => { if(d.data().active) allProducts.push({id:d.id, data:d.data()}); });
    allProducts.sort((a,b) => (a.data.createdAt||'').localeCompare(b.data.createdAt||''));
  } catch(err) {
    console.warn('商品讀取失敗', err);
  }
}

// cardName: 牌名（可為空字串），cardLabel: 位置代號 A/B/C...
function showProductsForCard(cardName, cardLabel){
  const area = document.getElementById('productsArea');
  if(!allProducts.length){ area.style.display='none'; return; }
  const posKey = 'pos:' + cardLabel;
  const filtered = allProducts.filter(({data:d}) => {
    const bindings = Array.isArray(d.cardBindings) ? d.cardBindings : [];
    if(bindings.length === 0) return true;                   // 通用：全部顯示
    if(cardName && bindings.includes(cardName)) return true; // 牌名匹配
    if(bindings.includes(posKey)) return true;               // 位置匹配（pos:A）
    return false;
  });
  if(!filtered.length){ area.style.display='none'; return; }
  renderProducts(filtered);
  area.style.display = '';
}

function renderProducts(docs){
  const area = document.getElementById('productsArea');
  area.innerHTML = `<div class="products-title">✦ 推薦給你 ✦</div><div class="products-grid" id="prodGrid"></div>`;
  const grid = area.querySelector('#prodGrid');
  docs.forEach(({data:d}) => {
    const link = d.link || '#';
    const imgHtml = d.imageData
      ? `<img class="prod-card-img" src="${d.imageData}" alt="${d.name}" loading="lazy">`
      : `<div class="prod-card-img-placeholder">✦</div>`;
    const card = document.createElement('a');
    card.className = 'prod-card';
    card.href = link; card.target = '_blank'; card.rel = 'noopener noreferrer';
    card.innerHTML = `
      ${imgHtml}
      <div class="prod-card-body">
        ${d.tag   ? `<div class="prod-card-tag">${d.tag}</div>` : ''}
        <div class="prod-card-name">${d.name}</div>
        ${d.description ? `<div class="prod-card-desc">${d.description}</div>` : ''}
        ${d.price ? `<div class="prod-card-price">${d.price}</div>` : ''}
        ${link!=='#' ? `<div class="prod-card-cta">了解更多 →</div>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

initFrontend();
</script>
