<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>每日塔羅占卜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0b0818}
body{
  font-family:'Noto Serif TC',serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;padding:1.2rem;
}
.wrap{
  width:100%;max-width:440px;
  background:linear-gradient(160deg,#1a1040 0%,#230f5a 30%,#2a0e55 60%,#180e3a 100%);
  border-radius:28px;
  border:1.5px solid rgba(160,130,255,0.25);
  box-shadow:0 0 60px rgba(100,60,200,0.3),0 0 0 1px rgba(255,255,255,0.04);
  overflow:hidden;position:relative;
}
.stars-bg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:1.8rem 1.2rem 1rem}
.brand-name{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:#e8d8ff;letter-spacing:.12em;margin-bottom:3px;text-shadow:0 0 20px rgba(180,140,255,0.5)}
.brand-sub{font-size:11px;color:rgba(180,155,255,0.65);margin-bottom:1.1rem;letter-spacing:.1em}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:1rem;width:100%;max-width:200px}
.divider hr{flex:1;border:none;border-top:1px solid rgba(160,130,220,0.3)}
.divider span{font-size:12px;color:rgba(200,170,255,0.6)}
.prompt-txt{font-size:13px;color:rgba(200,175,255,0.85);margin-bottom:.5rem;letter-spacing:.04em;text-align:center}
.date-badge{font-size:11px;color:rgba(180,155,255,0.5);background:rgba(120,90,200,0.15);border:1px solid rgba(160,130,220,0.2);border-radius:20px;padding:3px 14px;margin-bottom:1.2rem}

/* cards */
.cards-row{display:flex;justify-content:center;gap:14px;margin-bottom:1rem;position:relative;z-index:1;flex-wrap:wrap;padding:0 .8rem}
.card-wrap{width:100px;height:160px;perspective:900px;cursor:pointer;flex-shrink:0;filter:drop-shadow(0 8px 24px rgba(80,40,180,0.4));transition:filter .3s}
.card-wrap:hover:not(.done) .card-inner{transform:translateY(-10px) scale(1.05)!important}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)!important}
.card-wrap.faded{opacity:.12;pointer-events:none;transition:opacity .5s;filter:none}
.card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,.2,.2,1)}
.cface{position:absolute;width:100%;height:100%;border-radius:18px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}

/* back */
.cback{background:linear-gradient(155deg,#150f35 0%,#221660 45%,#2e1258 100%);border:1.5px solid rgba(160,130,255,0.45);box-shadow:inset 0 0 30px rgba(100,60,200,0.2)}
.cback-inner{width:82%;height:84%;border-radius:13px;border:1px solid rgba(180,155,255,0.25);background:rgba(80,50,160,0.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.cback-lbl{font-family:'Cinzel',serif;font-size:11px;color:rgba(200,180,255,0.55);letter-spacing:.15em;margin-top:4px}

/* front — default symbol */
.cfront{transform:rotateY(180deg);background:linear-gradient(150deg,#e8e0ff 0%,#f2eaff 45%,#fde8ff 100%);border:1.5px solid rgba(160,140,240,0.7);box-shadow:0 0 0 .5px rgba(255,255,255,.5)}
.cfront-inner{width:82%;height:84%;border-radius:13px;border:1px solid rgba(160,130,220,0.5);background:linear-gradient(145deg,rgba(255,255,255,0.7),rgba(240,230,255,0.5));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.4rem;overflow:hidden}
.cfront-symbol{font-size:30px;line-height:1;margin-bottom:3px}
.cfront-lbl{font-family:'Cinzel',serif;font-size:26px;font-weight:600;color:#4a3890;line-height:1;margin-bottom:4px}
.cfront-name{font-size:9.5px;font-weight:600;color:#3a2d8a;letter-spacing:.06em;text-align:center;line-height:1.3}
.cfront-sub{font-size:8.5px;color:#8060c0;letter-spacing:.08em;margin-top:2px}

/* front — custom image */
.cfront.has-img{background:none;border:none}
.cfront.has-img .cfront-inner{background:none;border:none;padding:0;width:100%;height:100%}
.cfront.has-img .cfront-inner img{width:100%;height:100%;object-fit:cover;border-radius:18px;display:block}

.hint-row{font-size:12px;color:rgba(190,165,255,0.75);text-align:center;margin-bottom:.6rem;position:relative;z-index:1;min-height:18px}
.reselect-btn{display:none;margin:0 auto .8rem;background:rgba(255,255,255,0.08);border:1.5px solid rgba(160,130,220,0.4);color:rgba(200,175,255,0.85);font-family:'Noto Serif TC',serif;font-size:12px;padding:5px 20px;border-radius:20px;cursor:pointer;transition:background .2s;position:relative;z-index:1}
.reselect-btn:hover{background:rgba(160,130,220,0.15)}
.reselect-btn.show{display:block;width:fit-content}

.no-content{margin:.5rem .8rem 1rem;padding:1.2rem;text-align:center;color:rgba(180,155,255,0.45);font-size:13px;border:1px dashed rgba(160,130,220,0.2);border-radius:16px;position:relative;z-index:1}

/* result */
.result-area{display:none;margin:0 .8rem .9rem;background:linear-gradient(150deg,rgba(240,236,255,0.97),rgba(248,240,255,0.96),rgba(252,238,255,0.97));border:1.5px solid rgba(160,140,240,0.5);border-radius:20px;padding:1.1rem 1.15rem 1rem;text-align:left;animation:fadeUp .5s ease;position:relative;z-index:1}
.result-area.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.res-badge{display:inline-block;font-size:11px;font-weight:600;color:#5038a0;background:rgba(160,130,220,0.18);border:1px solid rgba(140,110,210,0.35);border-radius:10px;padding:2px 12px;letter-spacing:.05em;margin-bottom:8px}
.res-card-name{font-size:12px;color:#8050b8;margin-bottom:6px;font-weight:600;display:flex;align-items:center;gap:5px}
.res-title{font-size:14.5px;font-weight:600;color:#1e1870;margin-bottom:10px;line-height:1.6}
.res-body{font-size:13px;color:#2e2878;line-height:1.85;margin-bottom:10px}
.res-body p{margin-bottom:6px}
.res-tip{background:rgba(255,255,255,0.75);border:1.5px solid rgba(180,155,255,0.45);border-radius:14px;padding:9px 13px;font-size:13px;font-weight:500;color:#1e1870;margin-bottom:10px;line-height:1.65}
.res-cta{font-size:12px;color:#5848a8;line-height:1.8;border-top:1px solid rgba(180,160,240,0.35);padding-top:10px;margin-bottom:10px}
.btn-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.contact-btn{display:inline-block;background:linear-gradient(120deg,#3828a0,#8020b8);color:#fff;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:500;padding:8px 22px;border-radius:22px;text-decoration:none;box-shadow:0 4px 16px rgba(80,40,180,0.35);cursor:pointer;border:none}
.contact-btn:hover{opacity:.9}
.again-btn{background:rgba(255,255,255,0.65);border:1.5px solid rgba(160,140,240,0.5);color:#5040a8;font-family:'Noto Serif TC',serif;font-size:12px;padding:7px 16px;border-radius:22px;cursor:pointer}
.again-btn:hover{background:rgba(200,180,255,0.25)}

/* result card thumb */
.res-card-thumb{width:52px;height:83px;border-radius:9px;object-fit:cover;margin-bottom:8px;border:1px solid rgba(160,130,220,0.4);display:block}

/* loading */
.loading-msg{text-align:center;color:rgba(200,175,255,0.7);font-size:13px;padding:2rem 1rem;position:relative;z-index:1}

/* ── 推薦商品區 ── */
.products-area{margin:0 .8rem 1.2rem;position:relative;z-index:1}
.products-title{font-size:11px;color:rgba(180,155,255,.55);letter-spacing:.1em;text-align:center;margin-bottom:.7rem;display:flex;align-items:center;gap:8px}
.products-title::before,.products-title::after{content:'';flex:1;border-top:1px solid rgba(160,130,220,.2)}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.prod-card{background:linear-gradient(150deg,rgba(240,236,255,.95),rgba(250,243,255,.95));border:1.5px solid rgba(160,140,240,.4);border-radius:16px;overflow:hidden;text-decoration:none;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(100,60,200,.18)}
.prod-card-img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block}
.prod-card-img-placeholder{width:100%;aspect-ratio:3/2;background:linear-gradient(135deg,rgba(107,63,192,.12),rgba(160,80,232,.1));display:flex;align-items:center;justify-content:center;font-size:28px}
.prod-card-body{padding:.55rem .65rem .6rem;flex:1;display:flex;flex-direction:column;gap:3px}
.prod-card-tag{font-size:9.5px;color:#8060c0;letter-spacing:.06em}
.prod-card-name{font-size:12px;font-weight:600;color:#1e1870;line-height:1.4}
.prod-card-desc{font-size:10.5px;color:#5040a0;line-height:1.5;opacity:.85}
.prod-card-price{font-size:12px;font-weight:700;color:#3828a0;margin-top:auto;padding-top:4px}
.prod-card-cta{font-size:10px;color:#8020b8;text-align:right;margin-top:2px;opacity:.75}

@media(max-width:480px){.wrap{border-radius:22px;max-width:100%}.card-wrap{width:86px;height:138px}.cfront-symbol{font-size:26px}.cfront-lbl{font-size:22px}}
@media(max-width:360px){.cards-row{gap:9px}.card-wrap{width:78px;height:124px}.products-grid{grid-template-columns:1fr}}
</style>
</head>

    <circle cx="30" cy="55" r="1.4" fill="#a090e0" opacity=".45"/><circle cx="390" cy="38" r="1.1" fill="#c0a8f0" opacity=".38"/>

<!-- Firebase SDK (compat 版本) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ========== Firebase 設定（與 admin.html 保持一致）==========
const firebaseConfig = {
  apiKey: "AIzaSyCY1ceNPz1QIAgRngezIhTXiJx_o10uUh0",
  authDomain: "tarot-1ce81.firebaseapp.com",
  projectId: "tarot-1ce81",
  storageBucket: "tarot-1ce81.firebasestorage.app",
  messagingSenderId: "943943050390",
  appId: "1:943943050390:web:488b2c155bee1630324eb7"
};
firebase.initializeApp(firebaseConfig);
const fdb = firebase.firestore();
const COLLECTION      = 'tarot_readings';
const PROD_COLLECTION = 'shop_products';
// ============================================================

const LABELS = ['A','B','C','D','E'];
const CARD_SYMBOLS = {
  '愚者':'🌟','魔法師':'✨','女祭司':'🌙','女皇':'🌸','皇帝':'👑','教皇':'🕯️',
  '戀人':'💞','戰車':'🏹','力量':'🦁','隱士':'🔦','命運之輪':'🎡','正義':'⚖️',
  '倒吊人':'🌀','死神':'🦋','節制':'💧','惡魔':'🔥','高塔':'⚡','星星':'⭐',
  '月亮':'🌕','太陽':'☀️','審判':'🎺','世界':'🌍'
};
function getSymbol(n){
  if(!n) return '✦';
  if(CARD_SYMBOLS[n]) return CARD_SYMBOLS[n];
  if(n.startsWith('權杖')) return '🔥';
  if(n.startsWith('聖杯')) return '💧';
  if(n.startsWith('寶劍')) return '🗡️';
  if(n.startsWith('金幣')) return '🪙';
  return '✦';
}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDate(k){const[y,m,d]=k.split('-');return`${y} 年 ${Number(m)} 月 ${Number(d)} 日`}

function drawBackCanvas(canvas, label){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  function moon(cx,cy,r,col,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.globalAlpha=a*.15;ctx.fillStyle=col;ctx.fill();ctx.globalAlpha=a*.7;ctx.stroke();ctx.beginPath();ctx.arc(cx+r*.32,cy,r*.72,0,Math.PI*2);ctx.globalAlpha=a*.28;ctx.fillStyle='#0b0818';ctx.fill();ctx.restore()}
  function star5(cx,cy,r,col,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=.8;ctx.beginPath();for(let i=0;i<5;i++){const ang=-Math.PI/2+i*Math.PI*2/5;const x=cx+Math.cos(ang)*r,y=cy+Math.sin(ang)*r;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.globalAlpha=a*.2;ctx.fillStyle=col;ctx.fill();ctx.globalAlpha=a*.7;ctx.stroke();ctx.restore()}
  moon(W/2,H/2-2,H*.27,'#c8b8ff',.9);
  star5(8,8,5,'#a0b8ff',.7);star5(W-8,10,4,'#e0b8ff',.65);star5(6,H-8,4,'#b8c8ff',.6);star5(W-7,H-8,4.5,'#d0b0f8',.65);
  [[W/2+16,7],[4,H/2],[W-4,H/2-4],[W/2-18,H-5]].forEach(([x,y])=>{ctx.save();ctx.globalAlpha=.55;ctx.fillStyle='rgba(220,200,255,.8)';ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();ctx.restore()});
  ctx.save();ctx.globalAlpha=.55;ctx.fillStyle='rgba(200,180,255,.6)';ctx.font='bold 9px Cinzel,serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,W/2,H/2+H*.38);ctx.restore()
}
function drawFrontCanvas(canvas){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=.6;ctx.strokeStyle='#8060c0';ctx.lineWidth=.7;ctx.beginPath();
  for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;const x=W/2+Math.cos(a)*Math.min(W,H)*.38,y=H/2+Math.sin(a)*Math.min(W,H)*.38;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.closePath();ctx.globalAlpha=.15;ctx.fillStyle='#8060c0';ctx.fill();ctx.globalAlpha=.6;ctx.stroke();ctx.restore()
}

let done=false, currentData=null, allProducts=[];

async function initFrontend(){
  document.getElementById('dateBadge').textContent = fmtDate(today());
  let data = null;
  try {
    const snap = await fdb.collection(COLLECTION).doc(today()).get();
    if(snap.exists) data = snap.data();
  } catch(err) {
    console.error('Firestore 讀取失敗：', err);
    document.getElementById('loadingMsg').textContent = '✦ 連線失敗，請稍後再試 ✦';
    return;
  }
  document.getElementById('loadingMsg').style.display = 'none';
  if(data && data.brandName) document.getElementById('brandName').textContent = data.brandName;
  if(data && data.brandSub)  document.getElementById('brandSub').textContent  = data.brandSub;
  if(data && data.contactLabel) window._cLabel = data.contactLabel;
  if(data && data.contactLink)  window._cLink  = data.contactLink;
  if(data && data.contactCta)   window._cCta   = data.contactCta;
  if(!data || !data.cards || !data.cards.length){
    document.getElementById('noContent').style.display = 'block';
  } else {
    document.getElementById('cardsRow').style.display = '';
    document.getElementById('hintTxt').style.display  = '';
    currentData = data;
    buildCards(data.cards);
  }
  // 非同步載入推薦商品（不影響主流程）
  loadProducts();
}

function buildCards(cards){
  const row = document.getElementById('cardsRow');
  row.innerHTML = ''; done = false;
  cards.forEach((card, i) => {
    const lbl    = LABELS[i];
    const hasImg = !!(card.imageData);
    const hasName = !!(card.name);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap'; wrap.id = 'cw'+lbl; wrap.onclick = () => pick(lbl, i);
    if(hasImg){
      wrap.innerHTML = `<div class="card-inner">
        <div class="cface cback"><div class="cback-inner"><canvas id="cv${lbl}" width="62" height="56"></canvas></div></div>
        <div class="cface cfront has-img"><div class="cfront-inner"><img src="${card.imageData}" alt="${card.name||lbl}" loading="lazy"></div></div>
      </div>`;
    } else if(hasName) {
      // 有牌名：顯示符號 + 牌名
      wrap.innerHTML = `<div class="card-inner">
        <div class="cface cback"><div class="cback-inner"><canvas id="cv${lbl}" width="62" height="56"></canvas></div></div>
        <div class="cface cfront"><div class="cfront-inner">
          <canvas id="fcv${lbl}" width="28" height="28"></canvas>
          <div class="cfront-symbol">${getSymbol(card.name)}</div>
          <div class="cfront-name">${card.name}</div>
          <div class="cfront-sub">已翻開</div>
        </div></div>
      </div>`;
    } else {
      // 無牌名：只顯示大字母代號
      wrap.innerHTML = `<div class="card-inner">
        <div class="cface cback"><div class="cback-inner"><canvas id="cv${lbl}" width="62" height="56"></canvas></div></div>
        <div class="cface cfront"><div class="cfront-inner">
          <canvas id="fcv${lbl}" width="28" height="28"></canvas>
          <div class="cfront-lbl">${lbl}</div>
          <div class="cfront-sub">已翻開</div>
        </div></div>
      </div>`;
    }
    row.appendChild(wrap);
    requestAnimationFrame(() => {
      drawBackCanvas(document.getElementById('cv'+lbl), lbl);
      const fc = document.getElementById('fcv'+lbl); if(fc) drawFrontCanvas(fc);
    });
  });
}

function pick(lbl, idx){
  if(done) return; done = true;
  document.getElementById('cw'+lbl).classList.add('flipped');
  currentData.cards.forEach((_,i) => {
    const l = LABELS[i];
    const el = document.getElementById('cw'+l);
    if(el){ el.classList.add('done'); if(l!==lbl) el.classList.add('faded'); }
  });
  document.getElementById('hintTxt').textContent = '✦ 牌面揭曉';
  document.getElementById('reselBtn').classList.add('show');
  setTimeout(() => showResult(idx), 760);
}

function showResult(idx){
  const card  = currentData.cards[idx];
  const lbl   = LABELS[idx];
  const paras = (card.reading||'').split('\n\n').filter(p=>p.trim()).map(p=>'<p>'+p+'</p>').join('');
  const ctaText      = window._cCta   || '🌙 如果你想深入了解更多，歡迎預約一對一占卜';
  const contactLabel = window._cLabel || '預約占卜';
  const contactLink  = window._cLink  || '#';
  const thumbHtml = card.imageData ? `<img class="res-card-thumb" src="${card.imageData}" alt="${card.name||lbl}">` : '';
  const nameHtml = card.name
    ? `<div class="res-card-name">${getSymbol(card.name)} ${card.name}</div>`
    : '';
  const el = document.getElementById('resultArea');
  el.innerHTML = `
    <div class="res-badge">你選了 ${lbl} 牌</div>
    ${thumbHtml}
    ${nameHtml}
    <div class="res-title">${card.title||''}</div>
    <div class="res-body">${paras}</div>
    ${card.tip ? `<div class="res-tip">✦ ${card.tip}</div>` : ''}
    <div class="res-cta">${ctaText}</div>
    <div class="btn-row">
      <button class="contact-btn" onclick="window.open('${contactLink}','_blank')">${contactLabel}</button>
      <button class="again-btn" onclick="doReset()">再抽一次</button>
    </div>`;
  el.classList.add('show');
  showProductsForCard(card.name || '');
}

function doReset(){
  done = false;
  if(currentData && currentData.cards) buildCards(currentData.cards);
  document.getElementById('reselBtn').classList.remove('show');
  const ra = document.getElementById('resultArea');
  ra.classList.remove('show'); ra.innerHTML = '';
  document.getElementById('hintTxt').textContent = '輕觸一張牌，揭開今日的訊息 ✨';
  document.getElementById('productsArea').style.display = 'none';
}

// ==============================
//  推薦商品區
// ==============================
async function loadProducts(){
  // 讀全域開關
  try {
    const cfg = await fdb.doc('settings/global').get();
    if(cfg.exists && cfg.data().showProducts === false) return;
  } catch(e) { /* 讀不到就當作開啟 */ }

  try {
    const snap = await fdb.collection(PROD_COLLECTION).get();
    allProducts = [];
    snap.forEach(d => { if(d.data().active) allProducts.push({id:d.id, data:d.data()}); });
    allProducts.sort((a,b) => (a.data.createdAt||'').localeCompare(b.data.createdAt||''));
  } catch(err) {
    console.warn('商品讀取失敗（不影響主功能）', err);
  }
}

// 根據抽到的牌名篩選並顯示商品
function showProductsForCard(cardName){
  const area = document.getElementById('productsArea');
  if(!allProducts.length){ area.style.display='none'; return; }

  // 過濾：cardBindings 有值 → 只在符合的牌顯示；空陣列或無此欄位 → 通用（全牌都顯示）
  const filtered = allProducts.filter(({data:d}) => {
    const bindings = Array.isArray(d.cardBindings) ? d.cardBindings : [];
    return bindings.length === 0 || bindings.includes(cardName);
  });

  if(!filtered.length){ area.style.display='none'; return; }
  renderProducts(filtered);
  area.style.display = '';
}

function renderProducts(docs){
  const area = document.getElementById('productsArea');
  area.innerHTML = `
    <div class="products-title">✦ 推薦給你 ✦</div>
    <div class="products-grid" id="prodGrid"></div>`;
  const grid = area.querySelector('#prodGrid');
  docs.forEach(({data:d}) => {
    const link = d.link || '#';
    const imgHtml = d.imageData
      ? `<img class="prod-card-img" src="${d.imageData}" alt="${d.name}" loading="lazy">`
      : `<div class="prod-card-img-placeholder">✦</div>`;
    const card = document.createElement('a');
    card.className = 'prod-card';
    card.href = link;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.innerHTML = `
      ${imgHtml}
      <div class="prod-card-body">
        ${d.tag ? `<div class="prod-card-tag">${d.tag}</div>` : ''}
        <div class="prod-card-name">${d.name}</div>
        ${d.description ? `<div class="prod-card-desc">${d.description}</div>` : ''}
        ${d.price ? `<div class="prod-card-price">${d.price}</div>` : ''}
        ${link !== '#' ? `<div class="prod-card-cta">了解更多 →</div>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

initFrontend();
</script>
